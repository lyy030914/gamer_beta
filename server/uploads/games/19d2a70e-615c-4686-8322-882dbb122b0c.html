<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Coin Dash</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Arial', sans-serif; overflow: hidden; }
#gameContainer { position: relative; width: 90vw; max-width: 800px; aspect-ratio: 16/9; background: #16213e; border-radius: 12px; box-shadow: 0 0 40px rgba(0,0,0,0.5); overflow: hidden; }
canvas { display: block; width: 100%; height: 100%; background: #87CEEB; }
#ui { position: absolute; top: 0; left: 0; right: 0; padding: 10px 20px; display: flex; justify-content: space-between; color: white; font-size: 18px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); pointer-events: none; z-index: 10; }
#ui span { background: rgba(0,0,0,0.4); padding: 4px 12px; border-radius: 8px; }
#overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.7); z-index: 20; pointer-events: auto; }
#overlay h1 { font-size: 48px; color: #FFD700; text-shadow: 4px 4px 8px rgba(0,0,0,0.8); margin-bottom: 10px; }
#overlay p { font-size: 22px; color: white; margin: 8px 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.6); }
#overlay button { padding: 14px 40px; font-size: 24px; background: #FFD700; color: #1a1a2e; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 20px; box-shadow: 0 4px 0 #b8860b; transition: 0.1s; pointer-events: auto; }
#overlay button:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #b8860b; }
#overlay button:active { transform: translateY(4px); box-shadow: 0 0 0 #b8860b; }
#controls { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.6); font-size: 14px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); z-index: 10; pointer-events: none; background: rgba(0,0,0,0.3); padding: 4px 16px; border-radius: 20px; }
@media (max-width: 600px) {
  #ui { font-size: 14px; padding: 6px 12px; }
  #overlay h1 { font-size: 32px; }
  #overlay p { font-size: 18px; }
  #overlay button { padding: 10px 30px; font-size: 20px; }
}
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>
  <div id="ui">
    <span id="scoreDisplay">Score: 0</span>
    <span id="levelDisplay">Level 1</span>
    <span id="livesDisplay">Lives: 3</span>
  </div>
  <div id="overlay">
    <h1 id="titleText">Coin Dash</h1>
    <p id="subText">Collect coins, reach the flag!</p>
    <button id="startBtn">Start Game</button>
  </div>
  <div id="controls">Arrow Keys / A D · Space / W to jump</div>
</div>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('gameContainer');

let W, H;

function resize() {
  const rect = container.getBoundingClientRect();
  canvas.width = rect.width * (window.devicePixelRatio || 1);
  canvas.height = rect.height * (window.devicePixelRatio || 1);
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  W = canvas.width;
  H = canvas.height;
}
resize();
window.addEventListener('resize', resize);

// Audio
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playTone(freq, duration, type = 'square', vol = 0.12) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playCoin() { playTone(880, 0.12, 'sine', 0.1); playTone(1320, 0.1, 'sine', 0.07); }
function playJump() { playTone(520, 0.15, 'square', 0.06); }
function playHurt() { playTone(200, 0.3, 'sawtooth', 0.1); }
function playWin() { playTone(660, 0.15, 'sine', 0.1); setTimeout(()=>playTone(880,0.15,'sine',0.1),150); setTimeout(()=>playTone(1100,0.2,'sine',0.1),300); }
function playLevelComplete() { playTone(880,0.1,'sine',0.08); setTimeout(()=>playTone(1100,0.1,'sine',0.08),100); setTimeout(()=>playTone(1320,0.15,'sine',0.08),200); }
function playFall() { playTone(150, 0.4, 'sawtooth', 0.08); }

// Game State
const STATE = { MENU: 0, PLAYING: 1, LEVEL_COMPLETE: 2, GAME_OVER: 3, WIN: 4 };
let gameState = STATE.MENU;
let score = 0;
let lives = 3;
let currentLevel = 1;
const MAX_LEVELS = 5;

// Input
const keys = {};
document.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'ArrowLeft' || e.key === 'ArrowRight') e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
container.addEventListener('touchstart', handleTouch, {passive: false});
container.addEventListener('touchmove', handleTouch, {passive: false});
container.addEventListener('touchend', handleTouchEnd, {passive: false});

let touchLeft = false, touchRight = false, touchJump = false;
function handleTouch(e) {
  e.preventDefault();
  const rect = container.getBoundingClientRect();
  for (let t of e.touches) {
    const x = t.clientX - rect.left;
    const y = t.clientY - rect.top;
    const relX = x / rect.width;
    const relY = y / rect.height;
    if (relX < 0.33) touchLeft = true;
    else if (relX < 0.66) { touchJump = true; touchLeft = false; touchRight = false; }
    else touchRight = true;
  }
}
function handleTouchEnd(e) {
  touchLeft = false;
  touchRight = false;
  touchJump = false;
}

// Player
const player = {
  x: 100, y: 300, w: 32, h: 40,
  vx: 0, vy: 0,
  onGround: false,
  jumpHeld: false,
  jumpTimer: 0,
  facing: 1,
  animFrame: 0,
  animTimer: 0,
  invincible: 0
};

const GRAVITY = 0.6;
const JUMP_FORCE = -10;
const MOVE_SPEED = 5;
const FRICTION = 0.8;
const MAX_FALL = 12;

// Camera
let cameraX = 0;
const CAMERA_OFFSET = W * 0.3;

// Level data
let platforms = [];
let coins = [];
let spikes = [];
let exitFlag = null;
let levelWidth = 0;

function generateLevel(level) {
  platforms = [];
  coins = [];
  spikes = [];
  exitFlag = null;
  
  const difficulty = Math.min(level, MAX_LEVELS);
  const numPlatforms = 12 + difficulty * 3;
  const baseGap = 80 + difficulty * 15;
  const heightVariation = 100 + difficulty * 20;
  
  // Ground platforms
  let x = 0;
  for (let i = 0; i < numPlatforms; i++) {
    const pw = 80 + Math.random() * 120;
    const py = H - 60 - Math.random() * heightVariation;
    platforms.push({ x: x, y: py, w: pw, h: 16 });
    
    // Coins on platforms
    const numCoins = 1 + Math.floor(Math.random() * 2);
    for (let c = 0; c < numCoins; c++) {
      const cx = x + 20 + Math.random() * (pw - 40);
      coins.push({ x: cx, y: py - 20 - Math.random() * 30, w: 16, h: 16, collected: false });
    }
    
    // Air coins
    if (Math.random() < 0.3) {
      coins.push({ x: x + pw/2, y: py - 60 - Math.random() * 40, w: 16, h: 16, collected: false });
    }
    
    // Spikes
    if (i > 1 && Math.random() < 0.25 + difficulty * 0.05) {
      spikes.push({ x: x + pw/2 - 10, y: py - 12, w: 20, h: 12 });
    }
    
    x += pw + baseGap + Math.random() * 40;
  }
  
  // Final platform with exit
  const finalX = x + 60;
  platforms.push({ x: finalX, y: H - 80, w: 100, h: 16 });
  exitFlag = { x: finalX + 50, y: H - 130, w: 12, h: 48 };
  // Coins near exit
  coins.push({ x: finalX + 30, y: H - 110, w: 16, h: 16, collected: false });
  coins.push({ x: finalX + 70, y: H - 110, w: 16, h: 16, collected: false });
  
  // Extra coins in air
  for (let i = 0; i < 3 + difficulty; i++) {
    const rx = 100 + Math.random() * (finalX - 200);
    const ry = 80 + Math.random() * (H - 160);
    coins.push({ x: rx, y: ry, w: 16, h: 16, collected: false });
  }
  
  levelWidth = finalX + 200;
  
  // Place player at start
  player.x = 80;
  player.y = H - 120;
  player.vx = 0;
  player.vy = 0;
  player.onGround = false;
  cameraX = 0;
}

// Particles
let particles = [];

function spawnParticles(x, y, color, count = 10) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      life: 30 + Math.random() * 20,
      maxLife: 50,
      color,
      size: 3 + Math.random() * 4
    });
  }
}

// Drawing helpers
function drawPlayer() {
  const px = player.x - cameraX;
  const py = player.y;
  
  ctx.save();
  ctx.translate(px + player.w/2, py + player.h/2);
  if (player.facing < 0) ctx.scale(-1, 1);
  
  // Body
  ctx.fillStyle = '#4a90d9';
  ctx.fillRect(-player.w/2, -player.h/2, player.w, player.h);
  
  // Hat
  ctx.fillStyle = '#e74c3c';
  ctx.fillRect(-player.w/2 - 2, -player.h/2 - 8, player.w + 4, 8);
  ctx.fillRect(-player.w/2 - 4, -player.h/2 - 4, player.w + 8, 4);
  
  // Eyes
  ctx.fillStyle = 'white';
  ctx.fillRect(2, -6, 6, 6);
  ctx.fillRect(10, -6, 6, 6);
  ctx.fillStyle = '#2c3e50';
  ctx.fillRect(5, -4, 3, 4);
  ctx.fillRect(13, -4, 3, 4);
  
  // Legs
  ctx.fillStyle = '#2c3e50';
  const legOffset = player.onGround ? Math.sin(Date.now() * 0.01) * 2 : 0;
  ctx.fillRect(-8, player.h/2 - 6, 7, 8 + legOffset);
  ctx.fillRect(1, player.h/2 - 6, 7, 8 - legOffset);
  
  ctx.restore();
  
  // Invincibility flash
  if (player.invincible > 0 && Math.floor(Date.now() / 80) % 2 === 0) {
    ctx.save();
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = 'white';
    ctx.fillRect(px, py, player.w, player.h);
    ctx.restore();
  }
}

function drawPlatforms() {
  for (const p of platforms) {
    const px = p.x - cameraX;
    if (px + p.w < -50 || px > W + 50) continue;
    
    // Grass top
    ctx.fillStyle = '#2ecc71';
    ctx.fillRect(px, p.y, p.w, 4);
    // Dirt
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(px, p.y + 4, p.w, p.h - 4);
    // Texture
    ctx.fillStyle = '#6B3410';
    for (let i = 0; i < p.w; i += 12) {
      ctx.fillRect(px + i, p.y + 6, 4, 2);
    }
  }
}

function drawCoins() {
  const time = Date.now() * 0.003;
  for (const c of coins) {
    if (c.collected) continue;
    const cx = c.x - cameraX;
    if (cx < -30 || cx > W + 30) continue;
    
    const bob = Math.sin(time + c.x) * 3;
    // Glow
    ctx.save();
    ctx.shadowColor = '#FFD700';
    ctx.shadowBlur = 12;
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.arc(cx + c.w/2, c.y + c.h/2 + bob, c.w/2, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    // Inner
    ctx.fillStyle = '#FFA500';
    ctx.beginPath();
    ctx.arc(cx + c.w/2, c.y + c.h/2 + bob, c.w/2 - 3, 0, Math.PI * 2);
    ctx.fill();
    // Star
    ctx.fillStyle = '#FFD700';
    ctx.font = '12px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('★', cx + c.w/2, c.y + c.h/2 + bob + 1);
    ctx.restore();
  }
}

function drawSpikes() {
  for (const s of spikes) {
    const sx = s.x - cameraX;
    if (sx < -30 || sx > W + 30) continue;
    
    ctx.fillStyle = '#e74c3c';
    for (let i = 0; i < s.w; i += 8) {
      ctx.beginPath();
      ctx.moveTo(sx + i, s.y + s.h);
      ctx.lineTo(sx + i + 4, s.y);
      ctx.lineTo(sx + i + 8, s.y + s.h);
      ctx.fill();
    }
  }
}

function drawExit() {
  if (!exitFlag) return;
  const ex = exitFlag.x - cameraX;
  if (ex < -50 || ex > W + 50) return;
  
  // Flag pole
  ctx.fillStyle = '#8B4513';
  ctx.fillRect(ex, exitFlag.y, 4, exitFlag.h);
  
  // Flag
  const wave = Math.sin(Date.now() * 0.005) * 3;
  ctx.fillStyle = '#e74c3c';
  ctx.beginPath();
  ctx.moveTo(ex + 4, exitFlag.y + 4);
  ctx.lineTo(ex + 24 + wave, exitFlag.y + 12);
  ctx.lineTo(ex + 4, exitFlag.y + 20);
  ctx.fill();
  
  // Star on top
  ctx.fillStyle = '#FFD700';
  ctx.font = '14px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('★', ex + 2, exitFlag.y - 4);
}

function drawBackground() {
  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#87CEEB');
  grad.addColorStop(0.6, '#B0E0E6');
  grad.addColorStop(1, '#98FB98');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  
  // Clouds
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  for (let i = 0; i < 5; i++) {
    const cx = ((i * 200 + 50) - cameraX * 0.2) % (W + 200) - 100;
    const cy = 40 + i * 25;
    ctx.beginPath();
    ctx.arc(cx, cy, 30, 0, Math.PI * 2);
    ctx.arc(cx + 30, cy - 10, 25, 0, Math.PI * 2);
    ctx.arc(cx + 60, cy, 30, 0, Math.PI * 2);
    ctx.fill();
  }
  
  // Mountains in background
  ctx.fillStyle = 'rgba(100,180,100,0.3)';
  for (let i = 0; i < 6; i++) {
    const mx = i * 250 - cameraX * 0.1;
    const mw = 180 + Math.sin(i * 2) * 50;
    ctx.beginPath();
    ctx.moveTo(mx, H);
    ctx.lineTo(mx + mw/2, H - 120 - Math.sin(i * 1.5) * 40);
    ctx.lineTo(mx + mw, H);
    ctx.fill();
  }
}

function drawParticles() {
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - cameraX - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

// Physics & game logic
function updatePlayer() {
  // Input
  let moveX = 0;
  if (keys['a'] || keys['arrowleft'] || touchLeft) moveX = -1;
  if (keys['d'] || keys['arrowright'] || touchRight) moveX = 1;
  
  if (moveX !== 0) player.facing = moveX;
  
  // Movement
  player.vx += moveX * 0.8;
  player.vx *= FRICTION;
  if (Math.abs(player.vx) > MOVE_SPEED) player.vx = Math.sign(player.vx) * MOVE_SPEED;
  
  // Jump
  const jumpPressed = keys[' '] || keys['w'] || keys['arrowup'] || touchJump;
  if (jumpPressed && player.onGround && !player.jumpHeld) {
    player.vy = JUMP_FORCE;
    player.onGround = false;
    player.jumpHeld = true;
    player.jumpTimer = 8;
    playJump();
    spawnParticles(player.x + player.w/2, player.y + player.h, '#2ecc71', 5);
  }
  if (jumpPressed && player.jumpTimer > 0 && !player.onGround) {
    player.vy += -0.3;
    player.jumpTimer--;
  }
  if (!jumpPressed) {
    player.jumpHeld = false;
    player.jumpTimer = 0;
  }
  
  // Gravity
  player.vy += GRAVITY;
  if (player.vy > MAX_FALL) player.vy = MAX_FALL;
  
  // Horizontal collision
  player.x += player.vx;
  // Keep in level bounds
  if (player.x < 0) { player.x = 0; player.vx = 0; }
  if (player.x + player.w > levelWidth) { player.x = levelWidth - player.w; player.vx = 0; }
  
  // Vertical collision
  player.y += player.vy;
  player.onGround = false;
  
  for (const p of platforms) {
    // Horizontal overlap
    if (player.x + player.w > p.x && player.x < p.x + p.w) {
      // Falling onto platform
      if (player.vy > 0 && player.y + player.h > p.y && player.y + player.h < p.y + p.h + player.vy + 4) {
        player.y = p.y - player.h;
        player.vy = 0;
        player.onGround = true;
      }
      // Hitting bottom
      else if (player.vy < 0 && player.y < p.y + p.h && player.y > p.y + p.h - 10) {
        player.y = p.y + p.h;
        player.vy = 0;
      }
    }
  }
  
  // Fall off screen
  if (player.y > H + 50) {
    loseLife();
    return;
  }
  
  // Spike collision
  for (const s of spikes) {
    if (player.x + player.w > s.x && player.x < s.x + s.w &&
        player.y + player.h > s.y && player.y < s.y + s.h) {
      if (player.invincible <= 0) {
        loseLife();
        return;
      }
    }
  }
  
  // Coin collection
  for (const c of coins) {
    if (c.collected) continue;
    if (player.x + player.w > c.x && player.x < c.x + c.w &&
        player.y + player.h > c.y && player.y < c.y + c.h) {
      c.collected = true;
      score += 10;
      playCoin();
      spawnParticles(c.x + c.w/2, c.y + c.h/2, '#FFD700', 12);
      updateUI();
    }
  }
  
  // Exit flag
  if (exitFlag && player.x + player.w > exitFlag.x && player.x < exitFlag.x + exitFlag.w &&
      player.y + player.h > exitFlag.y && player.y < exitFlag.y + exitFlag.h) {
    if (currentLevel >= MAX_LEVELS) {
      gameState = STATE.WIN;
      playWin();
      showOverlay('🏆 You Win!', `Final Score: ${score}`, 'Play Again');
    } else {
      gameState = STATE.LEVEL_COMPLETE;
      playLevelComplete();
      showOverlay(`Level ${currentLevel} Complete!`, `Score: ${score} · Lives: ${lives}`, 'Next Level');
    }
    return;
  }
  
  // Camera
  const targetCam = player.x - CAMERA_OFFSET;
  cameraX += (targetCam - cameraX) * 0.1;
  if (cameraX < 0) cameraX = 0;
  if (cameraX > levelWidth - W) cameraX = levelWidth - W;
  
  // Anim
  if (Math.abs(player.vx) > 0.5) {
    player.animTimer++;
    if (player.animTimer > 8) {
      player.animTimer = 0;
      player.animFrame = (player.animFrame + 1) % 2;
    }
  } else {
    player.animFrame = 0;
    player.animTimer = 0;
  }
  
  // Invincibility
  if (player.invincible > 0) player.invincible--;
}

function loseLife() {
  lives--;
  playHurt();
  spawnParticles(player.x + player.w/2, player.y + player.h/2, '#e74c3c', 15);
  updateUI();
  
  if (lives <= 0) {
    gameState = STATE.GAME_OVER;
    playFall();
    showOverlay('💀 Game Over', `Final Score: ${score}`, 'Try Again');
  } else {
    // Respawn
    player.x = 80;
    player.y = H - 120;
    player.vx = 0;
    player.vy = 0;
    player.invincible = 60;
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// UI
const scoreDisplay = document.getElementById('scoreDisplay');
const levelDisplay = document.getElementById('levelDisplay');
const livesDisplay = document.getElementById('livesDisplay');
const overlay = document.getElementById('overlay');
const titleText = document.getElementById('titleText');
const subText = document.getElementById('subText');
const startBtn = document.getElementById('startBtn');

function updateUI() {
  scoreDisplay.textContent = `Score: ${score}`;
  levelDisplay.textContent = `Level ${currentLevel}`;
  livesDisplay.textContent = `Lives: ${lives}`;
}

function showOverlay(title, sub, btnText) {
  titleText.textContent = title;
  subText.textContent = sub;
  startBtn.textContent = btnText;
  overlay.style.display = 'flex';
}

function hideOverlay() {
  overlay.style.display = 'none';
}

startBtn.addEventListener('click', startGame);

function startGame() {
  if (gameState === STATE.WIN || gameState === STATE.GAME_OVER) {
    score = 0;
    lives = 3;
    currentLevel = 1;
  } else if (gameState === STATE.LEVEL_COMPLETE) {
    currentLevel++;
  }
  gameState = STATE.PLAYING;
  hideOverlay();
  generateLevel(currentLevel);
  updateUI();
}

// Game loop
function gameLoop() {
  if (gameState === STATE.PLAYING) {
    updatePlayer();
    updateParticles();
  }
  
  // Draw
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawPlatforms();
  drawSpikes();
  drawCoins();
  drawExit();
  drawPlayer();
  drawParticles();
  
  requestAnimationFrame(gameLoop);
}

// Initial setup
generateLevel(1);
updateUI();
showOverlay('Coin Dash', 'Collect coins, reach the flag!', 'Start Game');
gameLoop();
</script>
</body>
</html>
