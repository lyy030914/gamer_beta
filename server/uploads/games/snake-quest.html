<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Quest</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'Segoe UI',sans-serif;overflow:hidden}
.container{text-align:center}
h1{color:#fff;margin-bottom:10px;font-size:24px;font-weight:700;letter-spacing:1px}
.score-wrap{display:flex;justify-content:center;gap:30px;margin-bottom:12px}
.score-item{color:#94a3b8;font-size:14px}
.score-item span{color:#6366f1;font-weight:700;font-size:18px}
canvas{border:2px solid #334155;border-radius:8px;background:#1e293b;display:block;margin:0 auto}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:10}
.overlay-card{background:#1e293b;border-radius:12px;padding:32px 40px;text-align:center;border:1px solid #334155}
.overlay-card h2{color:#fff;font-size:22px;margin-bottom:8px}
.overlay-card p{color:#94a3b8;margin-bottom:16px;font-size:14px}
.overlay-card .final-score{color:#6366f1;font-size:36px;font-weight:800;margin-bottom:20px}
.btn{background:linear-gradient(135deg,#6366f1,#a855f7);color:#fff;border:none;padding:10px 28px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:transform .2s}
.btn:hover{transform:scale(1.05)}
.tip{color:#64748b;font-size:12px;margin-top:12px}
</style>
</head>
<body>
<div class="container">
<h1>🐍 Snake Quest</h1>
<div class="score-wrap">
<div class="score-item">Score <span id="score">0</span></div>
<div class="score-item">Best <span id="best">0</span></div>
</div>
<canvas id="c"></canvas>
<p class="tip">Arrow Keys / WASD to move</p>
</div>
<div class="overlay" id="startOverlay">
<div class="overlay-card">
<h2>🐍 Snake Quest</h2>
<p>Eat food, grow longer, beat your high score!</p>
<button class="btn" onclick="startGame()">Start Game</button>
</div>
</div>
<div class="overlay" id="overOverlay" style="display:none">
<div class="overlay-card">
<h2>Game Over!</h2>
<div class="final-score" id="finalScore">0</div>
<button class="btn" onclick="startGame()">Play Again</button>
</div>
</div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
const grid=20,W=400,H=400;c.width=W;c.height=H;
let snake,dir,nextDir,food,score,best,loop,particles=[],speed=100;
best=parseInt(localStorage.getItem('snakeBest'))||0;
document.getElementById('best').textContent=best;
function init(){snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];dir={x:1,y:0};nextDir={x:1,y:0};score=0;particles=[];placeFood();document.getElementById('score').textContent=0}
function placeFood(){do{food={x:Math.floor(Math.random()*(W/grid)),y:Math.floor(Math.random()*(H/grid))}}while(snake.some(s=>s.x===food.x&&s.y===food.y))}
function spawnParticles(x,y){for(let i=0;i<8;i++){particles.push({x:x*grid+grid/2,y:y*grid+grid/2,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,life:1,color:`hsl(${Math.random()*60+250},80%,70%)`})}}
function startGame(){init();document.getElementById('startOverlay').style.display='none';document.getElementById('overOverlay').style.display='none';clearInterval(loop);loop=setInterval(update,speed)}
function update(){dir={...nextDir};const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
if(head.x<0||head.x>=W/grid||head.y<0||head.y>=H/grid||snake.some(s=>s.x===head.x&&s.y===head.y)){gameOver();return}
snake.unshift(head);
if(head.x===food.x&&head.y===food.y){score+=10;document.getElementById('score').textContent=score;spawnParticles(food.x,food.y);placeFood();if(score%50===0&&speed>40){speed-=5;clearInterval(loop);loop=setInterval(update,speed)}}
else{snake.pop()}
particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=0.02;return p.life>0});
draw()}
function draw(){ctx.fillStyle='#1e293b';ctx.fillRect(0,0,W,H);
ctx.fillStyle='#22c55e';snake.forEach((s,i)=>{const r=i===0?6:4;ctx.beginPath();ctx.roundRect(s.x*grid+2,s.y*grid+2,grid-4,grid-4,r);ctx.fill()});
ctx.fillStyle='#ef4444';ctx.shadowColor='#ef4444';ctx.shadowBlur=10;ctx.beginPath();ctx.arc(food.x*grid+grid/2,food.y*grid+grid/2,grid/2-2,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.fillRect(p.x-2,p.y-2,4,4)});ctx.globalAlpha=1}
function gameOver(){clearInterval(loop);if(score>best){best=score;localStorage.setItem('snakeBest',best);document.getElementById('best').textContent=best}
document.getElementById('finalScore').textContent=score;document.getElementById('overOverlay').style.display='flex'}
document.addEventListener('keydown',e=>{const k=e.key.toLowerCase();if(k==='arrowup'||k==='w'){if(dir.y!==1)nextDir={x:0,y:-1}}else if(k==='arrowdown'||k==='s'){if(dir.y!==-1)nextDir={x:0,y:1}}else if(k==='arrowleft'||k==='a'){if(dir.x!==1)nextDir={x:-1,y:0}}else if(k==='arrowright'||k==='d'){if(dir.x!==-1)nextDir={x:1,y:0}}});
[document.getElementById('c'),document.getElementById('c').parentElement].forEach(el=>{el.addEventListener('touchstart',function(e){e.preventDefault();const t=e.touches[0],r=el.getBoundingClientRect(),mx=t.clientX-r.left,my=t.clientY-r.top,dx=mx-snake[0].x*grid,dy=my-snake[0].y*grid;if(Math.abs(dx)>Math.abs(dy)){if(dx>0&&dir.x!==-1)nextDir={x:1,y:0};else if(dx<0&&dir.x!==1)nextDir={x:-1,y:0}}else{if(dy>0&&dir.y!==-1)nextDir={x:0,y:1};else if(dy<0&&dir.y!==1)nextDir={x:0,y:-1}}})});
init();draw();
</script>
</body>
</html>
