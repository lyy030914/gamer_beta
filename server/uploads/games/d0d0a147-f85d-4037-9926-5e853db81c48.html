<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Galactic Fury</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        #gameContainer {
            position: relative;
            width: 800px;
            max-width: 100vw;
            max-height: 100vh;
            aspect-ratio: 4/3;
            background: #000;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0,150,255,0.3);
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: transparent;
        }
        #ui {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
            font-size: 16px;
            text-shadow: 0 0 10px rgba(0,200,255,0.5);
            pointer-events: none;
            z-index: 10;
        }
        #ui .left, #ui .right { display: flex; align-items: center; gap: 20px; }
        #healthBar {
            width: 120px; height: 14px;
            background: #333;
            border-radius: 7px;
            overflow: hidden;
            border: 1px solid #555;
        }
        #healthFill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #ff4444, #ffaa00, #44ff44);
            transition: width 0.2s;
            border-radius: 7px;
        }
        #overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.7);
            color: #fff;
            z-index: 20;
            pointer-events: auto;
            backdrop-filter: blur(4px);
            text-align: center;
            padding: 20px;
        }
        #overlay h1 {
            font-size: 48px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ff6ec7, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0,200,255,0.3);
        }
        #overlay p {
            font-size: 18px;
            margin: 8px 0;
            opacity: 0.9;
        }
        #overlay .score { font-size: 28px; color: #ffd700; }
        #overlay button {
            margin-top: 20px;
            padding: 14px 48px;
            font-size: 22px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #00d4ff, #0066ff);
            color: #fff;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(0,100,255,0.5);
            transition: transform 0.2s, box-shadow 0.2s;
            pointer-events: auto;
        }
        #overlay button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(0,150,255,0.8);
        }
        #overlay .controls {
            margin-top: 15px;
            font-size: 14px;
            opacity: 0.6;
            line-height: 1.6;
        }
        .hidden { display: none !important; }
        @media (max-width: 600px) {
            #ui { font-size: 13px; padding: 6px 12px; }
            #healthBar { width: 80px; height: 10px; }
            #overlay h1 { font-size: 32px; }
            #overlay button { padding: 12px 32px; font-size: 18px; }
        }
    </style>
</head>
<body>
<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div class="left">
            <span>🔥 Score: <span id="scoreDisplay">0</span></span>
            <span>🌊 Wave: <span id="waveDisplay">1</span></span>
        </div>
        <div class="right">
            <span>❤️</span>
            <div id="healthBar"><div id="healthFill" style="width:100%"></div></div>
            <span id="healthText">5/5</span>
        </div>
    </div>
    <div id="overlay">
        <h1>🚀 GALACTIC FURY</h1>
        <p>Blast through endless alien waves!</p>
        <p class="score" id="highScoreDisplay">High Score: 0</p>
        <button id="startBtn">▶ PLAY</button>
        <div class="controls">
            <p>Arrow Keys / WASD: Move &nbsp;|&nbsp; Space / Click: Shoot</p>
        </div>
    </div>
</div>
<script>
    (function(){
        // ----- CANVAS SETUP -----
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('gameContainer');

        let W, H;
        function resizeCanvas() {
            const rect = container.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            W = canvas.width = rect.width * dpr;
            H = canvas.height = rect.height * dpr;
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
            ctx.scale(dpr, dpr);
            // store logical size
            W_logical = rect.width;
            H_logical = rect.height;
        }
        let W_logical, H_logical;
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // ----- DOM REFS -----
        const scoreDisplay = document.getElementById('scoreDisplay');
        const waveDisplay = document.getElementById('waveDisplay');
        const healthFill = document.getElementById('healthFill');
        const healthText = document.getElementById('healthText');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('startBtn');
        const highScoreDisplay = document.getElementById('highScoreDisplay');

        // ----- GAME STATE -----
        const STATE = { MENU: 0, PLAYING: 1, GAMEOVER: 2 };
        let state = STATE.MENU;
        let score = 0;
        let wave = 1;
        let highScore = parseInt(localStorage.getItem('galacticFuryHighScore')) || 0;
        highScoreDisplay.textContent = 'High Score: ' + highScore;

        // ----- PLAYER -----
        const player = {
            x: 0, y: 0, w: 28, h: 28,
            speed: 280,
            health: 5,
            maxHealth: 5,
            shield: false,
            spread: false,
            speedBoost: false,
            fireCooldown: 0,
            fireRate: 0.22, // seconds
            invincible: 0,
        };

        // ----- BULLETS & ENEMIES & POWERUPS & PARTICLES -----
        let bullets = [];
        let enemies = [];
        let powerups = [];
        let particles = [];
        let enemyBullets = [];

        // ----- INPUT -----
        const keys = {};
        let mouseX = 0, mouseY = 0, mouseDown = false;
        let mouseInside = false;

        document.addEventListener('keydown', e => {
            keys[e.key] = true;
            if (e.key === ' ' || e.key === 'Space') e.preventDefault();
        });
        document.addEventListener('keyup', e => { keys[e.key] = false; });
        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            mouseX = (e.clientX - rect.left);
            mouseY = (e.clientY - rect.top);
            mouseInside = true;
        });
        canvas.addEventListener('mouseleave', () => { mouseInside = false; });
        canvas.addEventListener('mousedown', e => {
            if (e.button === 0) { mouseDown = true; e.preventDefault(); }
        });
        canvas.addEventListener('mouseup', e => {
            if (e.button === 0) mouseDown = false;
        });
        // Touch support
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            mouseX = (touch.clientX - rect.left);
            mouseY = (touch.clientY - rect.top);
            mouseInside = true;
            mouseDown = true;
        }, { passive: false });
        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            mouseX = (touch.clientX - rect.left);
            mouseY = (touch.clientY - rect.top);
        }, { passive: false });
        canvas.addEventListener('touchend', e => {
            e.preventDefault();
            mouseDown = false;
            mouseInside = false;
        }, { passive: false });

        // ----- AUDIO (Web Audio) -----
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        function playBeep(freq, duration, type='square', volume=0.15) {
            try {
                initAudio();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(volume, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }
        function playShoot() { playBeep(800, 0.08, 'square', 0.08); }
        function playHit() { playBeep(300, 0.15, 'sawtooth', 0.12); }
        function playExplosion() { playBeep(120, 0.3, 'sawtooth', 0.15); }
        function playPowerup() { playBeep(600, 0.2, 'sine', 0.12); playBeep(900, 0.15, 'sine', 0.1); }
        function playBoss() { playBeep(180, 0.5, 'square', 0.1); }

        // ----- HELPER FUNCTIONS -----
        function rand(min, max) { return Math.random() * (max - min) + min; }
        function randInt(min, max) { return Math.floor(rand(min, max+1)); }
        function dist(a,b) { return Math.hypot(a.x-b.x, a.y-b.y); }
        function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

        // ----- SPAWN FUNCTIONS -----
        function spawnEnemy(type) {
            const e = {
                x: rand(30, W_logical-30),
                y: -30,
                w: 0, h: 0,
                type: type,
                hp: 1,
                maxHp: 1,
                speed: 60,
                color: '#ff4444',
                score: 10,
                fireTimer: 0,
                fireRate: 0,
                shape: 'square',
                phase: 0,
            };
            switch(type) {
                case 'basic':
                    e.w = 24; e.h = 24;
                    e.hp = 1; e.maxHp = 1;
                    e.speed = rand(50, 90);
                    e.color = '#ff6666';
                    e.score = 10;
                    e.shape = 'diamond';
                    e.fireRate = 0;
                    break;
                case 'fast':
                    e.w = 18; e.h = 18;
                    e.hp = 1; e.maxHp = 1;
                    e.speed = rand(140, 200);
                    e.color = '#ffaa00';
                    e.score = 15;
                    e.shape = 'triangle';
                    e.fireRate = 0;
                    break;
                case 'tank':
                    e.w = 34; e.h = 34;
                    e.hp = 3; e.maxHp = 3;
                    e.speed = rand(30, 50);
                    e.color = '#aa66ff';
                    e.score = 30;
                    e.shape = 'square';
                    e.fireRate = 2.5;
                    break;
                case 'boss':
                    e.w = 56; e.h = 56;
                    e.hp = 15 + wave * 2; e.maxHp = e.hp;
                    e.speed = rand(20, 35);
                    e.color = '#ff00ff';
                    e.score = 100 + wave * 10;
                    e.shape = 'hexagon';
                    e.fireRate = 1.2;
                    e.x = W_logical/2;
                    break;
            }
            return e;
        }

        function spawnWave() {
            const count = Math.min(4 + wave, 14);
            const types = ['basic','basic','fast','tank'];
            for (let i=0; i<count; i++) {
                let type;
                const r = Math.random();
                if (r < 0.5) type = 'basic';
                else if (r < 0.75) type = 'fast';
                else type = 'tank';
                if (wave % 3 === 0 && i === 0) type = 'boss';
                const e = spawnEnemy(type);
                // stagger spawn
                e.y = -e.h - i * 30;
                enemies.push(e);
            }
            // boss wave sound
            if (wave % 3 === 0) playBoss();
            wave++;
            waveDisplay.textContent = wave;
        }

        function spawnPowerup(x, y) {
            const r = Math.random();
            let type;
            if (r < 0.33) type = 'shield';
            else if (r < 0.66) type = 'spread';
            else type = 'speed';
            powerups.push({
                x, y, w: 20, h: 20,
                type: type,
                speed: 50,
                color: type === 'shield' ? '#44aaff' : (type === 'spread' ? '#ffaa44' : '#44ff88'),
                symbol: type === 'shield' ? '🛡' : (type === 'spread' ? '✸' : '⚡'),
                life: 8,
            });
        }

        function spawnParticles(x, y, color, count=20, speed=150) {
            for (let i=0; i<count; i++) {
                const angle = rand(0, Math.PI*2);
                const spd = rand(30, speed);
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * spd,
                    vy: Math.sin(angle) * spd,
                    life: rand(0.3, 0.8),
                    maxLife: rand(0.3, 0.8),
                    size: rand(2, 6),
                    color: color,
                });
            }
        }

        // ----- RESET GAME -----
        function resetGame() {
            player.x = W_logical/2;
            player.y = H_logical - 70;
            player.health = player.maxHealth = 5;
            player.shield = false;
            player.spread = false;
            player.speedBoost = false;
            player.fireCooldown = 0;
            player.invincible = 0;
            player.speed = 280;
            player.fireRate = 0.22;
            score = 0;
            wave = 1;
            bullets = [];
            enemies = [];
            powerups = [];
            particles = [];
            enemyBullets = [];
            updateUI();
            waveDisplay.textContent = wave;
        }

        function updateUI() {
            scoreDisplay.textContent = score;
            const pct = (player.health / player.maxHealth) * 100;
            healthFill.style.width = Math.max(0, pct) + '%';
            healthText.textContent = player.health + '/' + player.maxHealth;
        }

        // ----- GAME LOOP -----
        let lastTime = 0;
        let waveTimer = 0;
        let enemySpawned = false;

        function update(dt) {
            if (state !== STATE.PLAYING) return;

            // --- Player Movement ---
            let dx = 0, dy = 0;
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) dx = -1;
            if (keys['ArrowRight'] || keys['d'] || keys['D']) dx = 1;
            if (keys['ArrowUp'] || keys['w'] || keys['W']) dy = -1;
            if (keys['ArrowDown'] || keys['s'] || keys['S']) dy = 1;
            // mouse follow if inside
            if (mouseInside) {
                const mx = mouseX, my = mouseY;
                const diffX = mx - player.x;
                const diffY = my - player.y;
                const d = Math.hypot(diffX, diffY);
                if (d > 5) {
                    const moveSpeed = player.speed * (player.speedBoost ? 1.6 : 1);
                    const factor = Math.min(1, d / 30);
                    player.x += (diffX / d) * moveSpeed * dt * factor;
                    player.y += (diffY / d) * moveSpeed * dt * factor;
                }
            } else {
                const spd = player.speed * (player.speedBoost ? 1.6 : 1);
                if (dx !== 0 || dy !== 0) {
                    const len = Math.hypot(dx, dy);
                    player.x += (dx/len) * spd * dt;
                    player.y += (dy/len) * spd * dt;
                }
            }
            player.x = clamp(player.x, player.w/2, W_logical - player.w/2);
            player.y = clamp(player.y, player.h/2, H_logical - player.h/2);

            // --- Shooting ---
            player.fireCooldown -= dt;
            const firePressed = keys[' '] || keys['Space'] || mouseDown;
            if (firePressed && player.fireCooldown <= 0) {
                player.fireCooldown = player.fireRate;
                playShoot();
                if (player.spread) {
                    for (let angle = -0.3; angle <= 0.3; angle += 0.15) {
                        bullets.push({
                            x: player.x, y: player.y - player.h/2,
                            vx: Math.sin(angle) * 400,
                            vy: -500,
                            w: 4, h: 14,
                            damage: 1,
                            color: '#00ffff',
                        });
                    }
                } else {
                    bullets.push({
                        x: player.x, y: player.y - player.h/2,
                        vx: 0, vy: -550,
                        w: 4, h: 16,
                        damage: 1,
                        color: '#00ffff',
                    });
                }
            }

            // --- Update Bullets ---
            for (let i=bullets.length-1; i>=0; i--) {
                const b = bullets[i];
                b.x += b.vx * dt;
                b.y += b.vy * dt;
                if (b.y < -20 || b.x < -20 || b.x > W_logical+20) {
                    bullets.splice(i,1);
                }
            }

            // --- Update Enemy Bullets ---
            for (let i=enemyBullets.length-1; i>=0; i--) {
                const b = enemyBullets[i];
                b.x += b.vx * dt;
                b.y += b.vy * dt;
                if (b.y > H_logical+20 || b.x < -20 || b.x > W_logical+20) {
                    enemyBullets.splice(i,1);
                }
            }

            // --- Update Enemies ---
            for (let i=enemies.length-1; i>=0; i--) {
                const e = enemies[i];
                e.y += e.speed * dt;
                e.phase += dt * 2;
                // sinusoidal movement for some
                if (e.type === 'fast' || e.type === 'boss') {
                    e.x += Math.sin(e.phase) * 30 * dt;
                }
                e.x = clamp(e.x, e.w/2, W_logical - e.w/2);

                // Enemy shooting
                if (e.fireRate > 0) {
                    e.fireTimer -= dt;
                    if (e.fireTimer <= 0) {
                        e.fireTimer = e.fireRate;
                        const angle = Math.atan2(player.y - e.y, player.x - e.x);
                        enemyBullets.push({
                            x: e.x, y: e.y + e.h/2,
                            vx: Math.cos(angle) * 180,
                            vy: Math.sin(angle) * 180,
                            w: 6, h: 6,
                            damage: 1,
                            color: '#ff4444',
                        });
                    }
                }

                // Remove if off screen
                if (e.y > H_logical + 60) {
                    enemies.splice(i,1);
                }
            }

            // --- Collisions: Bullets vs Enemies ---
            for (let i=bullets.length-1; i>=0; i--) {
                const b = bullets[i];
                let bulletUsed = false;
                for (let j=enemies.length-1; j>=0; j--) {
                    const e = enemies[j];
                    if (Math.abs(b.x - e.x) < (b.w + e.w)/2 && Math.abs(b.y - e.y) < (b.h + e.h)/2) {
                        // hit
                        e.hp -= b.damage;
                        spawnParticles(b.x, b.y, '#ffaa00', 5, 80);
                        bulletUsed = true;
                        if (e.hp <= 0) {
                            // destroyed
                            score += e.score;
                            updateUI();
                            spawnParticles(e.x, e.y, e.color, 30, 200);
                            playExplosion();
                            // drop powerup?
                            if (Math.random() < 0.2 + wave * 0.01) {
                                spawnPowerup(e.x, e.y);
                            }
                            enemies.splice(j,1);
                            // boss kill extra particles
                            if (e.type === 'boss') {
                                spawnParticles(e.x, e.y, '#ff00ff', 60, 300);
                                playPowerup();
                            }
                        } else {
                            playHit();
                        }
                        break;
                    }
                }
                if (bulletUsed) {
                    bullets.splice(i,1);
                }
            }

            // --- Collisions: Enemy Bullets vs Player ---
            if (player.invincible > 0) player.invincible -= dt;
            for (let i=enemyBullets.length-1; i>=0; i--) {
                const b = enemyBullets[i];
                if (Math.abs(b.x - player.x) < (b.w + player.w)/2 && Math.abs(b.y - player.y) < (b.h + player.h)/2) {
                    if (player.invincible <= 0) {
                        if (player.shield) {
                            player.shield = false;
                            player.invincible = 0.5;
                            spawnParticles(player.x, player.y, '#44aaff', 20, 150);
                            playPowerup();
                        } else {
                            player.health -= b.damage;
                            player.invincible = 0.8;
                            spawnParticles(player.x, player.y, '#ff4444', 15, 120);
                            playHit();
                            updateUI();
                        }
                    }
                    enemyBullets.splice(i,1);
                }
            }

            // --- Collisions: Enemies vs Player ---
            for (let i=enemies.length-1; i>=0; i--) {
                const e = enemies[i];
                if (Math.abs(e.x - player.x) < (e.w + player.w)/2 && Math.abs(e.y - player.y) < (e.h + player.h)/2) {
                    if (player.invincible <= 0) {
                        if (player.shield) {
                            player.shield = false;
                            player.invincible = 0.5;
                            spawnParticles(player.x, player.y, '#44aaff', 20, 150);
                            playPowerup();
                        } else {
                            const dmg = e.type === 'boss' ? 3 : (e.type === 'tank' ? 2 : 1);
                            player.health -= dmg;
                            player.invincible = 1.0;
                            spawnParticles(player.x, player.y, '#ff4444', 20, 150);
                            playHit();
                            updateUI();
                        }
                    }
                    // push enemy away
                    e.y += 20;
                    if (e.y > H_logical + 60) enemies.splice(i,1);
                }
            }

            // --- Powerups ---
            for (let i=powerups.length-1; i>=0; i--) {
                const p = powerups[i];
                p.y += p.speed * dt;
                p.life -= dt;
                if (p.life <= 0 || p.y > H_logical + 30) {
                    powerups.splice(i,1);
                    continue;
                }
                if (Math.abs(p.x - player.x) < (p.w + player.w)/2 && Math.abs(p.y - player.y) < (p.h + player.h)/2) {
                    // collect
                    playPowerup();
                    spawnParticles(p.x, p.y, '#ffdd44', 15, 100);
                    if (p.type === 'shield') player.shield = true;
                    else if (p.type === 'spread') player.spread = true;
                    else if (p.type === 'speed') player.speedBoost = true;
                    powerups.splice(i,1);
                }
            }

            // --- Particles ---
            for (let i=particles.length-1; i>=0; i--) {
                const p = particles[i];
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.life -= dt;
                if (p.life <= 0) particles.splice(i,1);
            }

            // --- Wave spawning ---
            waveTimer -= dt;
            if (enemies.length === 0 && waveTimer <= 0) {
                spawnWave();
                waveTimer = 3.0;
            }

            // --- Check lose condition ---
            if (player.health <= 0) {
                state = STATE.GAMEOVER;
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('galacticFuryHighScore', highScore);
                }
                highScoreDisplay.textContent = 'High Score: ' + highScore;
                overlay.classList.remove('hidden');
                overlay.innerHTML = `
                    <h1>💥 GAME OVER</h1>
                    <p class="score">Score: ${score}</p>
                    <p>Wave ${wave-1}</p>
                    <p style="margin-top:10px;font-size:20px;color:#ffd700;">High Score: ${highScore}</p>
                    <button id="restartBtn">🔄 PLAY AGAIN</button>
                    <div class="controls"><p>Arrow Keys / WASD: Move | Space / Click: Shoot</p></div>
                `;
                document.getElementById('restartBtn').addEventListener('click', startGame);
                document.getElementById('restartBtn').focus();
            }

            updateUI();
        }

        // ----- DRAW -----
        function drawStars() {
            if (!drawStars.cache) {
                drawStars.cache = [];
                for (let i=0; i<120; i++) {
